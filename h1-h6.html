    <h1>Теги h1-h6</h1>
    <hr>
    <label>
    <p>Теги h1–h6 в HTML — это элементы для создания заголовков на веб-странице.
        <p>Они помогают структурировать контент, делая его более доступным и понятным как для пользователей, так и для поисковых систем.</p> 

   <h2>"Уровни" тегов</h2>
<p>Чем выше цифра тега тем меньше будет заголовок. Например</p>
<p>Тег h1 — заголовок самого верхнего, наиболее значимого уровня, обычно отражает основную тему страницы.</p> 
<p>Тег h2 — заголовок второго уровня, обозначает крупные разделы или подтемы.</p>
<p>Тег h3 — это заголовок третьего уровня, используется для подразделов внутри тега h2.</p> 
<p>Тег h4 — нужен для обозначения подтем в теге h3.</p>
<p>Теги h5 и h6 это самые маленькие заголовки они нужны когда нужен жирный текст</p>
<hr>
<h2>P.S </h2><h5>рекомендую соблюдать порядок, то есть после тега h1 не должен идти h4 или h3 но распределение тегов ваше дело</h5>
<h5>ещё рекомендую не использовать эти теги для написания обычного текста для это лучше подходит тег "p"</h5>
<hr>
<p>Примеры:</p>
<h1>Это заголовок h1!</h1>
<h2>А это заголовок h2</h2>
<h3>Это h3</h3>
<h4>А это h4</h4>
<h5>Это h5 PS.у меня устала рука</h5>
<h6>А это h6</h6>
